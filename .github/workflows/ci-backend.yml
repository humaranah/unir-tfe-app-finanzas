name: CI - Backend

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build
        run: dotnet build backend/HA.TFG.AppFinanzas.BackEnd.slnx -c Release

      - name: Test
        run: dotnet test backend/HA.TFG.AppFinanzas.BackEnd.slnx -c Release --no-build --verbosity normal

  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Build for analysis
        run: dotnet build backend/HA.TFG.AppFinanzas.BackEnd.slnx -c Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
