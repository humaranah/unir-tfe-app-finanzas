name: CI - App (MAUI)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore
        run: dotnet restore app/HA.TFG.AppFinanzas.App.slnx

      - name: Build (Android)
        run: dotnet build app/source/HA.TFG.AppFinanzas.App/HA.TFG.AppFinanzas.App.csproj -f net10.0-android -c Release --no-restore

      - name: Test
        run: dotnet test app/test/HA.TFG.AppFinanzas.App.UnitTests/HA.TFG.AppFinanzas.App.UnitTests.csproj -f net10.0 -c Release --verbosity normal

  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Build for analysis
        run: dotnet build app/source/HA.TFG.AppFinanzas.App/HA.TFG.AppFinanzas.App.csproj -f net10.0-android -c Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install MAUI Windows workload
        run: dotnet workload install maui-windows

      - name: Restore
        run: dotnet restore app/source/HA.TFG.AppFinanzas.App/HA.TFG.AppFinanzas.App.csproj -f net10.0-windows10.0.19041.0

      - name: Build (Windows)
        run: dotnet build app/source/HA.TFG.AppFinanzas.App/HA.TFG.AppFinanzas.App.csproj -f net10.0-windows10.0.19041.0 -c Release --no-restore

      - name: Test
        run: dotnet test app/test/HA.TFG.AppFinanzas.App.UnitTests/HA.TFG.AppFinanzas.App.UnitTests.csproj -f net10.0 -c Release --verbosity normal
