name: CI - App (MAUI)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore
        run: dotnet restore app/HA.TFG.AppFinanzas.App.slnx -p:RuntimeIdentifier=android-arm64

      - name: Build (Android)
        run: dotnet build app/source/HA.TFG.AppFinanzas.App/HA.TFG.AppFinanzas.App.csproj -f net10.0-android -c Release --no-restore -p:RuntimeIdentifier=android-arm64

      - name: Test (Core)
        run: dotnet test app/test/HA.TFG.AppFinanzas.Core.Tests/HA.TFG.AppFinanzas.Core.Tests.csproj -f net10.0 -c Release --verbosity normal

      - name: Test (Infrastructure)
        run: dotnet test app/test/HA.TFG.AppFinanzas.Infrastructure.Tests/HA.TFG.AppFinanzas.Infrastructure.Tests.csproj -f net10.0 -c Release --verbosity normal
